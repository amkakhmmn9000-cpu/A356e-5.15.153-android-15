name: Build Samsung A35 Kernel SM-A356E

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      enable_ksu:
        description: 'Enable KernelSU?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_nuke_rkp:
        description: 'Nuke Samsung Anti-Root?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  KERNEL_SOURCE: "https://github.com/ravindu644/android_kernel_samsung_a35x"
  KERNEL_BRANCH: "main"
  ARCH: "arm64"
  DEFCONFIG: "exynos1380-a35x_defconfig"
  TARGET_SOC: "exynos1380"
  PLATFORM_VERSION: "15"
  ANDROID_MAJOR_VERSION: "v"
  CLANG_URL: "https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/clang-r416183b.tar.gz"
  GCC_URL: "https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz"

jobs:
  build:
    name: SM-A356E Kernel Build
    runs-on: ubuntu-22.04

    steps:

    # ══════════════════════════════════════════
    # 1 - Checkout
    # ══════════════════════════════════════════
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ══════════════════════════════════════════
    # 2 - Install Dependencies
    # ══════════════════════════════════════════
    - name: Install Build Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git curl wget \
          build-essential \
          libssl-dev libelf-dev \
          bison flex \
          python3 python-is-python3 \
          bc cpio kmod \
          zip unzip lz4 \
          device-tree-compiler \
          libncurses-dev \
          pahole openssl \
          zstd rsync \
          p7zip-full ccache
        echo "Dependencies installed"

    # ══════════════════════════════════════════
    # 3 - Download Toolchains
    # ══════════════════════════════════════════
    - name: Download Toolchains
      run: |
        mkdir -p $HOME/toolchains/clang
        mkdir -p $HOME/toolchains/gcc
        echo "Downloading Clang for kernel 5.15..."
        wget -q "${{ env.CLANG_URL }}" -O /tmp/clang.tar.gz
        tar -xzf /tmp/clang.tar.gz -C $HOME/toolchains/clang --strip-components=1
        echo "Downloading GCC..."
        wget -q "${{ env.GCC_URL }}" -O /tmp/gcc.tar.xz
        tar -xJf /tmp/gcc.tar.xz -C $HOME/toolchains/gcc --strip-components=1
        echo "$HOME/toolchains/clang/bin" >> $GITHUB_PATH
        echo "$HOME/toolchains/gcc/bin" >> $GITHUB_PATH
        $HOME/toolchains/clang/bin/clang --version | head -1
        echo "Toolchains ready"

    # ══════════════════════════════════════════
    # 4 - Clone Kernel Source
    # ══════════════════════════════════════════
    - name: Clone Kernel Source
      run: |
        echo "Cloning Samsung A35 kernel source..."
        git clone --depth=1 \
          --branch "${{ env.KERNEL_BRANCH }}" \
          "${{ env.KERNEL_SOURCE }}" \
          kernel
        chmod -R 755 kernel/
        echo "Kernel version:"
        make -C kernel kernelversion 2>/dev/null || true
        echo "Available defconfigs:"
        ls kernel/arch/arm64/configs/ | grep -i "a35\|exynos1380" || true

    # ══════════════════════════════════════════
    # 5 - Nuke Samsung Anti-Root
    # ══════════════════════════════════════════
    - name: Nuke Samsung Anti-Root Protections
      if: ${{ github.event.inputs.enable_nuke_rkp == 'true' || github.event_name == 'push' }}
      run: |
        cd kernel
        echo "Disabling RKP / DEFEX / FIVE / Knox..."
        find . -name "Kconfig" | xargs grep -l "RKP\|DEFEX\|SEC_RESTRICT_ROOTING\|FIVE\|UH_RKP" 2>/dev/null | while read f; do
          sed -i 's/^\(\s*default\s*\)y/\1n/g' "$f" 2>/dev/null || true
        done
        CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG }}"
        if [ -f "$CONFIG_FILE" ]; then
          echo "" >> "$CONFIG_FILE"
          echo "# Samsung Anti-Root Disabled" >> "$CONFIG_FILE"
          echo "# CONFIG_RKP_CFP_JOPP is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_RKP_CFP_ROPP is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_SECURITY_DEFEX is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_SEC_RESTRICT_ROOTING is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_UH_RKP is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_FIVE is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_GAF_V6 is not set" >> "$CONFIG_FILE"
          echo "Anti-root disabled in defconfig"
        else
          echo "Defconfig not found, will apply via custom.config"
        fi

    # ══════════════════════════════════════════
    # 6 - Integrate KernelSU
    # ══════════════════════════════════════════
    - name: Integrate KernelSU
      if: ${{ github.event.inputs.enable_ksu == 'true' || github.event_name == 'push' }}
      run: |
        cd kernel
        echo "Applying KernelSU patch..."
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        echo "KernelSU integrated"

    # ══════════════════════════════════════════
    # 7 - Generate .config
    # ══════════════════════════════════════════
    - name: Generate Kernel Config
      run: |
        cd kernel
        sed -i '/REAL_CC\|CFP_CC/d' Makefile 2>/dev/null || true
        make \
          ARCH=${{ env.ARCH }} \
          CC=clang \
          CROSS_COMPILE=aarch64-none-linux-gnu- \
          CLANG_TRIPLE=aarch64-none-linux-gnu- \
          TARGET_SOC=${{ env.TARGET_SOC }} \
          PLATFORM_VERSION=${{ env.PLATFORM_VERSION }} \
          ANDROID_MAJOR_VERSION=${{ env.ANDROID_MAJOR_VERSION }} \
          ${{ env.DEFCONFIG }}
        echo "Config generated successfully"

    # ══════════════════════════════════════════
    # 8 - Apply Custom Config
    # ══════════════════════════════════════════
    - name: Apply Custom Config
      run: |
        cd kernel
        echo "CONFIG_KSU=y" > custom.config
        echo "# CONFIG_MODVERSIONS is not set" >> custom.config
        echo "# CONFIG_MODULE_SIG is not set" >> custom.config
        echo "# CONFIG_MODULE_SIG_FORCE is not set" >> custom.config
        echo "# CONFIG_RKP_CFP_JOPP is not set" >> custom.config
        echo "# CONFIG_RKP_CFP_ROPP is not set" >> custom.config
        echo "# CONFIG_SECURITY_DEFEX is not set" >> custom.config
        echo "# CONFIG_SEC_RESTRICT_ROOTING is not set" >> custom.config
        echo "# CONFIG_UH_RKP is not set" >> custom.config
        echo "# CONFIG_FIVE is not set" >> custom.config
        echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> custom.config
        echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> custom.config
        echo "CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y" >> custom.config
        echo "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" >> custom.config
        echo "CONFIG_IOSCHED_CFQ=y" >> custom.config
        echo "CONFIG_IOSCHED_DEADLINE=y" >> custom.config
        echo "CONFIG_BTRFS_FS=y" >> custom.config
        echo "CONFIG_F2FS_FS=y" >> custom.config
        echo "CONFIG_NTFS_FS=y" >> custom.config
        echo "CONFIG_IKCONFIG=y" >> custom.config
        echo "CONFIG_IKCONFIG_PROC=y" >> custom.config
        if [ -f "scripts/kconfig/merge_config.sh" ]; then
          KCONFIG_CONFIG=.config scripts/kconfig/merge_config.sh -m .config custom.config
        else
          cat custom.config >> .config
        fi
        echo "Custom config applied"

    # ══════════════════════════════════════════
    # 9 - Compile Kernel
    # ══════════════════════════════════════════
    - name: Compile Kernel
      run: |
        cd kernel
        JOBS=$(nproc --all)
        echo "Building with $JOBS cores - SM-A356E | Android 15 | Kernel 5.15"
        make -j$JOBS \
          ARCH=${{ env.ARCH }} \
          CC=clang \
          CROSS_COMPILE=aarch64-none-linux-gnu- \
          CLANG_TRIPLE=aarch64-none-linux-gnu- \
          TARGET_SOC=${{ env.TARGET_SOC }} \
          PLATFORM_VERSION=${{ env.PLATFORM_VERSION }} \
          ANDROID_MAJOR_VERSION=${{ env.ANDROID_MAJOR_VERSION }} \
          2>&1 | tee ../build.log
        if [ -f "arch/arm64/boot/Image" ]; then
          echo "SUCCESS - Image built"
          ls -lh arch/arm64/boot/Image
        elif [ -f "arch/arm64/boot/Image.gz" ]; then
          echo "SUCCESS - Image.gz built"
          ls -lh arch/arm64/boot/Image.gz
        else
          echo "FAILED - no kernel image found"
          tail -80 ../build.log
          exit 1
        fi

    # ══════════════════════════════════════════
    # 10 - Get magiskboot
    # ══════════════════════════════════════════
    - name: Setup magiskboot
      run: |
        echo "Downloading Magisk to extract magiskboot..."
        wget -q "https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk" -O Magisk.apk
        unzip -q Magisk.apk "lib/x86_64/libmagiskboot.so" -d magisk_tmp 2>/dev/null || true
        if [ -f "magisk_tmp/lib/x86_64/libmagiskboot.so" ]; then
          cp magisk_tmp/lib/x86_64/libmagiskboot.so ./magiskboot
          chmod +x magiskboot
          sudo cp magiskboot /usr/local/bin/magiskboot
          echo "magiskboot ready"
        else
          echo "magiskboot extraction failed, boot.img step will be skipped"
        fi

    # ══════════════════════════════════════════
    # 11 - Package with AnyKernel3
    # ══════════════════════════════════════════
    - name: Package with AnyKernel3
      run: |
        echo "Packaging with AnyKernel3..."
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
        if [ -f "kernel/arch/arm64/boot/Image" ]; then
          cp kernel/arch/arm64/boot/Image AnyKernel3/
        elif [ -f "kernel/arch/arm64/boot/Image.gz" ]; then
          cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
        fi
        find kernel/arch/arm64/boot/dts -name "*.dtb" 2>/dev/null | head -1 | xargs -I{} cp {} AnyKernel3/dtb 2>/dev/null || true
        find kernel/arch/arm64/boot -name "dtbo.img" 2>/dev/null | xargs -I{} cp {} AnyKernel3/ 2>/dev/null || true
        KSU_TAG=""
        if [ "${{ github.event.inputs.enable_ksu }}" != "false" ]; then
          KSU_TAG="-KSU"
        fi
        DATE=$(date +%Y%m%d-%H%M)
        ZIP_NAME="SM-A356E-Kernel${KSU_TAG}-Android15-${DATE}.zip"
        cd AnyKernel3
        zip -r9 "../${ZIP_NAME}" . -x ".git/*" "README.md"
        cd ..
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
        echo "Package ready: ${ZIP_NAME}"
        ls -lh "${ZIP_NAME}"

    # ══════════════════════════════════════════
    # 12 - Upload Kernel ZIP
    # ══════════════════════════════════════════
    - name: Upload Kernel ZIP
      uses: actions/upload-artifact@v4
      with:
        name: SM-A356E-Kernel
        path: "*.zip"
        retention-days: 30

    # ══════════════════════════════════════════
    # 13 - Upload Build Log (always)
    # ══════════════════════════════════════════
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    # ══════════════════════════════════════════
    # 14 - Build Summary
    # ══════════════════════════════════════════
    - name: Build Summary
      if: success()
      run: |
        echo "========================================"
        echo "  BUILD SUCCESSFUL"
        echo "========================================"
        echo "  Device   : Samsung SM-A356E"
        echo "  Android  : 15 - One UI 7.0"
        echo "  Kernel   : 5.15 GKI 2.0"
        echo "  Exynos   : 1380"
        echo "  KernelSU : ${{ github.event.inputs.enable_ksu || 'true' }}"
        echo "  Anti-Root: ${{ github.event.inputs.enable_nuke_rkp || 'true' }}"
        echo "  Output   : ${{ env.ZIP_NAME }}"
        echo "  Date     : $(date)"
        echo "========================================"
        echo "  Download: Actions > This Run > Artifacts"
        echo "========================================"
