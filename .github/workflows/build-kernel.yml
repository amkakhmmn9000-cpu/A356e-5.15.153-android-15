name: Build A35 Kernel KernelSU

on:
  workflow_dispatch:
    inputs:
      UPLOAD_RELEASE:
        description: 'Upload as GitHub Release'
        required: true
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    - name: Set Variables
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
        echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV
        echo "CLANG_DIR=$GITHUB_WORKSPACE/clang" >> $GITHUB_ENV
        echo "OUT_DIR=$GITHUB_WORKSPACE/out" >> $GITHUB_ENV
        echo "AK3_DIR=$GITHUB_WORKSPACE/AnyKernel3" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git curl wget zip unzip \
          build-essential bc bison flex \
          libssl-dev libelf-dev \
          python3 \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          binutils-aarch64-linux-gnu \
          cpio lz4 ccache

    - name: Cache Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/clang
        key: proton-clang-v1

    - name: Download Proton Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 \
          https://github.com/kdrag0n/proton-clang \
          $GITHUB_WORKSPACE/clang

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 \
          https://github.com/physwizz/A356e-U-u4-V-u4 \
          $GITHUB_WORKSPACE/kernel
        cd $GITHUB_WORKSPACE/kernel
        KVER=$(make kernelversion 2>/dev/null || echo "5.15.x")
        echo "KERNEL_VER=$KVER" >> $GITHUB_ENV

    - name: Integrate KernelSU
      run: |
        cd $GITHUB_WORKSPACE/kernel
        git clone --depth=1 \
          --branch susfs-rksu-master \
          https://github.com/rsuntk/KernelSU \
          KernelSU
        ln -sf "../KernelSU/kernel" drivers/kernelsu
        if ! grep -q "kernelsu" drivers/Makefile 2>/dev/null; then
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
        fi
        if ! grep -q "kernelsu" drivers/Kconfig 2>/dev/null; then
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        fi
        KSU_VER=$(grep "^KERNELSU_VERSION" KernelSU/kernel/Makefile 2>/dev/null | awk '{print $3}' || echo "unknown")
        echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV

    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 \
          https://github.com/osm0sis/AnyKernel3 \
          $GITHUB_WORKSPACE/AnyKernel3
        cd $GITHUB_WORKSPACE/AnyKernel3
        cat > anykernel.sh << 'EOF'
# AnyKernel3 - Samsung A35 5G
properties() { '
kernel.string=A35 KernelSU Android 15
do.devicecheck=1
do.modules=0
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=a35x
device.name2=a35xq
device.name3=SM-A356E
device.name4=SM-A356B
'; }
block=/dev/block/platform/13100000.ufs/by-name/boot;
is_slot_device=0;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;
. tools/ak3-core.sh;
split_boot;
flash_boot;
EOF

    - name: Build Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export PLATFORM_VERSION=15
        export ANDROID_MAJOR_VERSION=v
        export TARGET_SOC=s5e8835
        export LLVM=1
        export LLVM_IAS=1
        export DEPMOD=depmod
        export DTC_FLAGS="-@"
        export KBUILD_BUILD_USER="GH-Actions"
        export KBUILD_BUILD_HOST="A356E"
        export CC="ccache clang"
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CCACHE_DIR=~/.ccache
        export CCACHE_MAXSIZE=5G

        mkdir -p $GITHUB_WORKSPACE/out
        cd $GITHUB_WORKSPACE/kernel

        echo "=== Making defconfig ==="
        make O=$GITHUB_WORKSPACE/out ARCH=arm64 \
          CC="ccache clang" \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 LLVM_IAS=1 \
          s5e8835-a35xjvxx_defconfig

        echo "=== Enabling KernelSU configs ==="
        CFG="$GITHUB_WORKSPACE/out/.config"
        for KEY in \
          CONFIG_KSU=y \
          CONFIG_KSU_DEBUG=n \
          CONFIG_KSU_SUSFS=y \
          CONFIG_KSU_SUSFS_SUS_PATH=y \
          CONFIG_KSU_SUSFS_SUS_MOUNT=y \
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y \
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y \
          CONFIG_KSU_SUSFS_SUS_KSTAT=y \
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n \
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y \
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y \
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
          CONFIG_KSU_SUSFS_ENABLE_LOG=y \
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y \
          CONFIG_KSU_SUSFS_SUS_SU=n; do
          K="${KEY%%=*}"
          V="${KEY##*=}"
          sed -i "/^${K}[= ]/d" "$CFG"
          sed -i "/^# ${K} is not set/d" "$CFG"
          echo "${K}=${V}" >> "$CFG"
        done

        make O=$GITHUB_WORKSPACE/out ARCH=arm64 \
          CC="ccache clang" \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 LLVM_IAS=1 \
          olddefconfig 2>/dev/null

        echo "=== Building ==="
        START=$(date +%s)
        make -j$(nproc) \
          O=$GITHUB_WORKSPACE/out \
          ARCH=arm64 \
          CC="ccache clang" \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 LLVM_IAS=1 \
          2>&1 | tee $GITHUB_WORKSPACE/build.log

        END=$(date +%s)
        MINS=$(( (END-START)/60 ))
        SECS=$(( (END-START)%60 ))
        echo "BUILD_TIME=${MINS}m ${SECS}s" >> $GITHUB_ENV

        if [ ! -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image" ]; then
          echo "BUILD FAILED"
          exit 1
        fi
        echo "Build done in ${MINS}m ${SECS}s"

    - name: Package ZIP
      run: |
        AK3=$GITHUB_WORKSPACE/AnyKernel3
        OUT=$GITHUB_WORKSPACE/out
        cp "$OUT/arch/arm64/boot/Image" "$AK3/"
        [ -f "$OUT/arch/arm64/boot/dtb.img"  ] && cp "$OUT/arch/arm64/boot/dtb.img"  "$AK3/"
        [ -f "$OUT/arch/arm64/boot/dtbo.img" ] && cp "$OUT/arch/arm64/boot/dtbo.img" "$AK3/"
        ZIP="A35_KSU_Android15_${{ env.BUILD_DATE }}.zip"
        echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV
        cd "$AK3"
        zip -r9 "$GITHUB_WORKSPACE/$ZIP" . -x "*.git*" -x "README.md"
        SIZE=$(du -sh "$GITHUB_WORKSPACE/$ZIP" | cut -f1)
        echo "ZIP_SIZE=$SIZE" >> $GITHUB_ENV
        echo "ZIP ready: $ZIP ($SIZE)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: A35-KSU-${{ env.BUILD_DATE }}
        path: ${{ github.workspace }}/${{ env.ZIP_NAME }}
        retention-days: 7
        compression-level: 0

    - name: Create Release
      if: ${{ github.event.inputs.UPLOAD_RELEASE == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: KSU-${{ env.BUILD_DATE }}
        name: A35 KernelSU Android15 ${{ env.BUILD_DATE }}
        body: |
          Samsung A35 5G (SM-A356E) Kernel + KernelSU

          - Device: SM-A356E
          - Android: 15 / One UI 7
          - Kernel: ${{ env.KERNEL_VER }}
          - KernelSU: ${{ env.KSU_VER }}
          - Build Time: ${{ env.BUILD_TIME }}
          - ZIP Size: ${{ env.ZIP_SIZE }}

          Flash via TWRP or Odin (boot.tar)
          Install KernelSU Manager APK after flashing
        fil+es: ${{ github.workspace }}/${{ env.ZIP_NAME }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-failed
        path: ${{ github.workspace }}/build.log
        retention-days: 3
